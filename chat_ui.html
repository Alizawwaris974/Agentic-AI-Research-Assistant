<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Notes — Agentic Research Assistant</title>
<style>
  :root{
    --paper:#F6F1E7; --paper-2:#EFE7D8; --ink:#26241F; --ink-soft:#5B5648;
    --rule:#D9CFB8; --amber:#D98E2B; --amber-deep:#A8651A; --teal:#2F6F62;
    --teal-soft:#E3EDE9; --card:#FFFDF8; --shadow: 0 1px 0 rgba(38,36,31,.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family: 'Iowan Old Style','Source Serif 4', Georgia, serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:'JetBrains Mono','SF Mono',Consolas,monospace; }
  header{
    padding:28px 32px 18px; border-bottom:2px solid var(--ink);
    display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  header h1{ font-size:1.5rem; margin:0; letter-spacing:.2px; }
  header .meta{ font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em;}
  .layout{
    display:grid; grid-template-columns: 1fr 230px; gap:0; max-width:1180px; margin:0 auto;
    min-height: calc(100vh - 96px);
  }
  @media (max-width: 800px){ .layout{ grid-template-columns: 1fr; } .rail{ display:none; } }

  .transcript{ padding:24px 32px 130px; overflow-y:auto; }
  .starter-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
  .starter{
    background:var(--card); border:1px solid var(--rule); border-radius:3px;
    padding:9px 13px; font-size:.82rem; cursor:pointer; color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace; transition:.15s;
  }
  .starter:hover{ border-color:var(--amber-deep); color:var(--ink); }

  .msg{ margin:0 0 22px; max-width: 72ch; animation: fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  .msg .role{
    font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.1em;
    text-transform:uppercase; color:var(--ink-soft); margin-bottom:4px; display:block;
  }
  .msg.user .role{ color:var(--teal); }
  .msg.assistant .role{ color:var(--amber-deep); }
  .msg .bubble{ font-size:1.04rem; line-height:1.6; white-space:pre-wrap; }
  .msg.user .bubble{ padding-left:14px; border-left:3px solid var(--teal); }
  .msg.assistant .bubble{ padding-left:14px; border-left:3px solid var(--amber); }

  .typing{ display:inline-flex; gap:4px; padding-left:14px; }
  .typing span{ width:5px; height:5px; border-radius:50%; background:var(--amber-deep); animation: bounce 1.1s infinite ease-in-out; }
  .typing span:nth-child(2){ animation-delay:.15s; } .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,80%,100%{ transform:translateY(0); opacity:.4;} 40%{ transform:translateY(-4px); opacity:1; } }

  .composer{
    position:fixed; bottom:0; left:0; right:0; background:linear-gradient(180deg, transparent, var(--paper) 35%);
    padding:22px 0 26px;
  }
  .composer-inner{ max-width:1180px; margin:0 auto; padding:0 32px; display:grid; grid-template-columns:1fr 230px; gap:0; }
  .composer form{
    grid-column:1; display:flex; gap:10px; background:var(--card); border:1px solid var(--ink);
    border-radius:4px; padding:6px 6px 6px 16px; box-shadow:0 2px 10px rgba(38,36,31,.08);
  }
  .composer input[type=text]{
    flex:1; border:none; outline:none; background:transparent; font-size:1rem;
    font-family:inherit; color:var(--ink); padding:10px 0;
  }
  .composer button{
    border:none; background:var(--ink); color:var(--paper); font-family:'JetBrains Mono',monospace;
    font-size:.78rem; letter-spacing:.05em; text-transform:uppercase; padding:0 18px; border-radius:3px; cursor:pointer;
  }
  .composer button:hover{ background:var(--amber-deep); }
  .composer button:disabled{ background:var(--rule); cursor:not-allowed; }

  .rail{
    border-left:1px solid var(--rule); padding:24px 18px; position:relative;
    font-family:'JetBrains Mono',monospace;
  }
  .rail-title{ font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:14px; }
  .tag{
    display:block; background:var(--teal-soft); border:1px solid var(--teal); color:var(--teal);
    font-size:.72rem; padding:7px 9px; border-radius:3px; margin-bottom:8px;
    animation: tagIn .3s ease;
  }
  .tag.done{ opacity:.55; }
  .tag .n{ font-weight:700; margin-right:5px; }
  @keyframes tagIn{ from{opacity:0; transform:translateX(8px);} to{opacity:1; transform:none;} }
  .rail-empty{ color:var(--rule); font-size:.74rem; }

  .session{ font-size:.66rem; color:var(--ink-soft); }
</style>
</head>
<body>
  <header>
    <h1>📓 Field Notes — Agentic Research Assistant</h1>
    <div class="meta" id="status">connecting…</div>
  </header>

  <div class="layout">
    <div class="transcript" id="transcript">
      <div class="starter-row" id="starters">
        <div class="starter" data-q="What is ReAct and how does it relate to tool use?">What is ReAct?</div>
        <div class="starter" data-q="What's 24 * 17, and what does RAG stand for?">Quick math + RAG def</div>
        <div class="starter" data-q="What's the latest news about open-weight AI models?">Latest AI news</div>
        <div class="starter" data-q="Explain the difference between fine-tuning and in-context learning.">Fine-tuning vs ICL</div>
      </div>
    </div>
    <aside class="rail">
      <div class="rail-title">Citations &amp; tool calls</div>
      <div id="rail-content"><div class="rail-empty">— none yet —</div></div>
    </aside>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <form id="form">
        <input type="text" id="input" placeholder="Ask a research question…" autocomplete="off" />
        <button type="submit" id="send">Send</button>
      </form>
    </div>
  </div>

<script>
  // Base URL: same origin by default. If this file is opened standalone
  // (not served by the FastAPI app), edit BASE_URL to your ngrok URL.
  const BASE_URL = window.location.origin.startsWith("file") ? "PASTE_YOUR_NGROK_URL_HERE" : window.location.origin;
  let sessionId = crypto.randomUUID();
  let tagCounter = 0;

  const transcript = document.getElementById('transcript');
  const railContent = document.getElementById('rail-content');
  const statusEl = document.getElementById('status');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  fetch(BASE_URL + '/health').then(r => r.json())
    .then(d => statusEl.textContent = `model: ${d.model} · ${d.tools.length} tools · session ${sessionId.slice(0,8)}`)
    .catch(() => statusEl.textContent = 'offline — check BASE_URL');

  document.getElementById('starters').addEventListener('click', (e) => {
    const q = e.target.getAttribute('data-q');
    if (q) { input.value = q; form.requestSubmit(); }
  });

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<span class="role">${role === 'user' ? 'You' : 'Assistant'}</span><div class="bubble"></div>`;
    div.querySelector('.bubble').textContent = text;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
    return div.querySelector('.bubble');
  }

  function addTag(label, done=false) {
    tagCounter += 1;
    const tag = document.createElement('div');
    tag.className = 'tag' + (done ? ' done' : '');
    tag.innerHTML = `<span class="n">[${tagCounter}]</span>${label}`;
    if (railContent.querySelector('.rail-empty')) railContent.innerHTML = '';
    railContent.appendChild(tag);
    railContent.scrollTop = railContent.scrollHeight;
    return tag;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    document.getElementById('starters').remove();
    addMessage('user', q);
    input.value = '';
    sendBtn.disabled = true;

    const bubble = addMessage('assistant', '');
    const typing = document.createElement('span');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(typing);

    let answer = '';
    const url = `${BASE_URL}/research/stream?query=${encodeURIComponent(q)}&session_id=${sessionId}`;
    const es = new EventSource(url);

    es.onmessage = (ev) => {
      const data = JSON.parse(ev.data);
      if (data.type === 'token') {
        if (bubble.contains(typing)) bubble.removeChild(typing);
        answer += data.content;
        bubble.textContent = answer;
      } else if (data.type === 'tool_call') {
        addTag(data.tool);
      } else if (data.type === 'tool_done') {
        const tags = railContent.querySelectorAll('.tag');
        const last = tags[tags.length - 1];
        if (last) last.classList.add('done');
      } else if (data.type === 'done') {
        if (data.answer) { answer = data.answer; bubble.textContent = answer; }
        es.close();
        sendBtn.disabled = false;
      } else if (data.type === 'error') {
        bubble.textContent = 'Error: ' + data.message;
        es.close();
        sendBtn.disabled = false;
      }
      transcript.scrollTop = transcript.scrollHeight;
    };

    es.onerror = () => {
      if (bubble.contains(typing)) bubble.removeChild(typing);
      if (!answer) bubble.textContent = '⚠️ Connection lost. Check that the backend is running and BASE_URL is correct.';
      es.close();
      sendBtn.disabled = false;
    };
  });
</script>
</body>
</html>
